<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прогноз погоды на карте</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Прогноз погоды</h1>
            <div class="search-box">
                <input type="text" id="city-search" placeholder="Введите название города...">
                <button id="search-btn">Найти</button>
            </div>
        </header>

        <main>
            <div id="map"></div>
            <div id="weather-modal" class="modal hidden">
                <div class="modal-content">
                    <span class="close-btn">&times;</span>
                    <h2 id="modal-city-name">Город</h2>
                    <div class="charts-container">
                        <canvas id="temp-chart"></canvas>
                        <canvas id="precip-chart"></canvas>
                        <canvas id="wind-chart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="cities.js"></script>
    <script src="script.js"></script>
</body>
</html>
